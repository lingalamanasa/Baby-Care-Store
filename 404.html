<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | Stackly Baby Care Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,182,193,0.1), rgba(135,206,235,0.1));
            padding: 2rem;
        }
        .error-content h1 {
            font-size: 8rem;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 0;
            text-shadow: 4px 4px 0 rgba(255,182,193,0.3);
        }
    </style>
</head>
<body>

    <section class="error-section">
        <div class="error-content animate-fade">
            <img src="assets/images/logo.webp" alt="Stackly Logo" style="height: 60px; margin-bottom: 2rem;">
            <h1>404</h1>
            <h2 class="mt-3">Oops! Page Not Found</h2>
            <p class="mt-3 text-gray" style="max-width: 400px; margin: 0 auto 2rem;">It seems the baby crawled away with this page. Don't worry, let's get you back home.</p>
            <a href="index.html" class="btn btn-primary"><i class="bi bi-house me-2" style="margin-right: 0.5rem;"></i> Back to Home</a>
        </div>
    </section>

</body>
</html>
