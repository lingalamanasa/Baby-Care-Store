<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly Baby Care Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style_v3.css">
    
    <style>
        .login-section {
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 3rem 4rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .login-card:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }
        .login-card .logo-container img {
            width: 100%;
            max-width: 180px;
            height: auto;
            margin-bottom: 2rem;
            object-fit: contain;
        }
        .login-card h2 {
            color: #0f172a;
            font-weight: 700;
            font-size: 1.75rem;
            margin-bottom: 2rem;
        }
        .form-control {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .btn-primary {
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
    </style>

</head>
<body>

    <section class="login-section">
        <div class="login-card animate-fade">
            
            <a href="index.html" class="logo-container" style="display: block;">
                <img src="assets/images/logo.webp" alt="Stackly Logo">
            </a>

            <h2 class="mb-4">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group mb-3" style="text-align: left;">
                    <label class="mb-2" style="display: block; font-weight: bold;">Full Name</label>
                    <input type="text" id="loginName" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="form-group mb-3" style="text-align: left;">
                    <label class="mb-2" style="display: block; font-weight: bold;">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group mb-3" style="text-align: left;">
                    <label class="mb-2" style="display: block; font-weight: bold;">Password</label>
                    <input type="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <div class="form-group mb-4" style="text-align: left;">
                    <label class="mb-2" style="display: block; font-weight: bold;">Select Role</label>
                    <select id="roleSelect" class="form-control" required style="cursor: pointer;">
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" style="margin-right: 0.5rem;"> Remember me
                    </label>
                    <a href="404.html" style="color: var(--secondary); font-weight: bold; font-size: 0.9rem;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <p class="mt-4" style="font-size: 0.9rem;">Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: bold;">Sign up</a></p>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
</body>
</html>
