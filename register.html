<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Stackly Baby Care Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--light), #FFE4E1);
            padding: 2rem;
        }
        .login-card {
            background: var(--white);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
    </style>
</head>
<body>

    <section class="login-section">
        <div class="login-card animate-fade">
            <a href="index.html">
                <img src="assets/images/logo.webp" alt="Stackly Logo" style="height: 50px; margin-bottom: 2rem;">
            </a>
            <h2 class="mb-4">Create an Account</h2>
            <form id="loginForm">
                <div class="form-group mb-3" style="text-align: left;">
                    <label class="mb-2" style="display: block; font-weight: bold;">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="form-group mb-3" style="text-align: left;">
                    <label class="mb-2" style="display: block; font-weight: bold;">Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group mb-3" style="text-align: left;">
                    <label class="mb-2" style="display: block; font-weight: bold;">Password</label>
                    <input type="password" class="form-control" placeholder="Create a password" required>
                </div>
                <div class="form-group mb-4" style="text-align: left;">
                    <label class="mb-2" style="display: block; font-weight: bold;">Register As</label>
                    <select id="roleSelect" class="form-control" required style="cursor: pointer;">
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>
            <p class="mt-4" style="font-size: 0.9rem;">Already have an account? <a href="login.html" style="color: var(--primary); font-weight: bold;">Sign in</a></p>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
</body>
</html>
